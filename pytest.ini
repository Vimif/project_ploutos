[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers
markers =
    unit: Fast unit tests without I/O or GPU
    integration: Integration tests with I/O, DB, or API
    slow: Slow tests for training or full backtests
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
