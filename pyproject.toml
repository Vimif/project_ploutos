[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ploutos-trading"
version = "2.0.0"
description = "Algorithmic Trading Bot"
requires-python = ">=3.9"

dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "polars>=0.20.0",
    "pyarrow>=14.0.0",
    "gymnasium>=0.29.0",
    "stable-baselines3>=2.0.0",
    "torch>=2.0.0",
    "yfinance>=0.2.28",
    "alpaca-py>=0.9.0",
    "wandb>=0.15.0",
    "psycopg2-binary>=2.9.0",
    "prometheus-client>=0.17.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "ta>=0.11.0",
    "scipy>=1.10.0"
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.7.0",
    "ruff>=0.3.0",
    "mypy>=1.5.0",
    "flask",
    "flask-cors",
    "flask-socketio",
    "gevent"
]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --cov=core --cov=training --cov=trading --cov-report=term-missing"
testpaths = [
    "tests"
]
pythonpath = [
    "."
]

[tool.coverage.run]
omit = [
    "tests/*",
    "scripts/*",
    "dashboard/*",
    "database/*",
    "config/*",
    "legacy/*",
    "core/sp500_scanner.py",
    "trading/alpaca_client.py",
    "trading/etoro_client.py",
    "trading/broker_factory.py",
    "trading/broker_interface.py",
    "trading/stop_loss_manager.py",
    "core/risk_manager.py"
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "C",   # flake8-comprehensions
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501", # line too long (handled by black)
    "B008", # do not perform function calls in argument defaults
    "C901", # too complex
    "W293", # blank line contains whitespace
    "W291", # trailing whitespace
    "E402", # module level import not at top of file
]
