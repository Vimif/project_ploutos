[project]
name = "ploutos-trading"
version = "2.0.0"
description = "Système de trading algorithmique avec Reinforcement Learning"
authors = [
    {name = "Vimif", email = "your@email.com"}
]
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "polars>=0.20.0",
    "pyarrow>=14.0.0",
    "gymnasium>=0.29.0",
    "stable-baselines3>=2.0.0",
    "torch>=2.0.0",
    "yfinance>=0.2.28",
    "alpaca-py>=0.9.0",
    "wandb>=0.15.0",
    "psycopg2-binary>=2.9.0",
    "prometheus-client>=0.17.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "ta>=0.11.0",
    "scipy>=1.10.0",
]

[project.optional-dependencies]
web = [
    "flask>=3.0.0",
    "flask-cors>=4.0.0",
]
training = [
    "sb3-contrib>=2.0.0",
    "tensorboard>=2.13.0",
    "tqdm>=4.65.0",
    "rich>=13.0.0",
    "optuna>=3.0.0",
]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.7.0",
    "ruff>=0.3.0",
    "mypy>=1.5.0",
]

[project.scripts]
ploutos-train = "training.train_v6_better_timing:main"
ploutos-backtest = "scripts.backtest_v6:main"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["core*", "training*", "trading*", "config*", "scripts*", "database*", "notifications*", "dashboard*"]
exclude = ["data*", "logs*", "models*", "runs*", "tests*", ".git*", ".vscode*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v"

[tool.black]
line-length = 100
target-version = ['py310']
exclude = '''
(
    config/hardware\.py | config/settings\.py | config/tickers\.py | core/data_fetcher\.py | core/data_pipeline\.py | core/macro_data\.py | core/risk_manager\.py | core/shared_memory_manager\.py | core/sp500_scanner\.py | core/transaction_costs\.py | core/utils\.py | dashboard/analytics\.py | dashboard/app\.py | dashboard/technical_analysis\.py | database/__init__\.py | database/db\.py | legacy/core/universal_environment_v6_better_timing\.py | legacy/training/train_v7_sp500_sectors\.py | notifications/discord_notifier\.py | scripts/backtest_ultimate\.py | scripts/build_dataset\.py | scripts/check_gpu\.py | scripts/import_grafana_dashboard\.py | scripts/init_database\.py | scripts/optimize_hyperparams\.py | scripts/paper_trade\.py | scripts/robustness_tests\.py | scripts/run_pipeline\.py | tests/conftest\.py | tests/e2e/test_training_flow\.py | tests/test_data_pipeline\.py | tests/test_env_config\.py | tests/test_integration_v9\.py | tests/test_portfolio\.py | tests/test_reward_calculator\.py | tests/test_shared_memory\.py | tests/test_trading_env_v8\.py | tests/v9_preflight_check\.py | tests/verify_days_held\.py | trading/alpaca_client\.py | trading/broker_factory\.py | trading/broker_interface\.py | trading/etoro_client\.py | trading/portfolio\.py | trading/stop_loss_manager\.py | training/train\.py
)
'''

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]

[tool.coverage.run]
omit = [
    "trading/alpaca_client.py",
    "trading/etoro_client.py",
    "core/sp500_scanner.py"
]
