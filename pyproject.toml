[project]
name = "ploutos-trading"
version = "2.0.0"
description = "Système de trading algorithmique avec Reinforcement Learning"
authors = [
    {name = "Vimif", email = "your@email.com"}
]
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}

dependencies = [
    "numpy>=1.24.0",
    "pandas>=2.0.0",
    "polars>=0.20.0",
    "pyarrow>=14.0.0",
    "gymnasium>=0.29.0",
    "stable-baselines3>=2.0.0",
    "torch>=2.0.0",
    "yfinance>=0.2.28",
    "alpaca-py>=0.9.0",
    "wandb>=0.15.0",
    "psycopg2-binary>=2.9.0",
    "prometheus-client>=0.17.0",
    "pyyaml>=6.0",
    "python-dotenv>=1.0.0",
    "requests>=2.31.0",
    "ta>=0.11.0",
    "scipy>=1.10.0",
]

[project.optional-dependencies]
web = [
    "flask>=3.0.0",
    "flask-cors>=4.0.0",
]
training = [
    "sb3-contrib>=2.0.0",
    "tensorboard>=2.13.0",
    "tqdm>=4.65.0",
    "rich>=13.0.0",
    "optuna>=3.0.0",
]
dev = [
    "pytest>=7.4.0",
    "pytest-cov>=4.1.0",
    "black>=23.7.0",
    "ruff>=0.3.0",
    "mypy>=1.5.0",
]

[project.scripts]
ploutos-train = "training.train_v6_better_timing:main"
ploutos-backtest = "scripts.backtest_v6:main"

[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["core*", "training*", "trading*", "config*", "scripts*", "database*", "notifications*", "dashboard*"]
exclude = ["data*", "logs*", "models*", "runs*", "tests*", ".git*", ".vscode*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v"

[tool.coverage.run]
omit = [
    "trading/alpaca_client.py",
    "trading/etoro_client.py",
    "core/sp500_scanner.py",
    "core/risk_manager.py",
]

[tool.black]
line-length = 100
target-version = ['py310']
extend-exclude = '''
(
  scripts/validate_pipeline\.py
  | config/settings\.py
  | config/tickers\.py
  | config/hardware\.py
  | core/data_pipeline\.py
  | core/shared_memory_manager\.py
  | core/macro_data\.py
  | core/data_fetcher\.py
  | core/utils\.py
  | core/sp500_scanner\.py
  | core/risk_manager\.py
  | core/transaction_costs\.py
  | database/__init__\.py
  | database/db\.py
  | dashboard/analytics\.py
  | dashboard/technical_analysis\.py
  | dashboard/app\.py
  | notifications/discord_notifier\.py
  | legacy/training/train_v7_sp500_sectors\.py
  | scripts/build_dataset\.py
  | legacy/core/universal_environment_v6_better_timing\.py
  | scripts/init_database\.py
  | scripts/check_gpu\.py
  | scripts/import_grafana_dashboard\.py
  | scripts/optimize_hyperparams\.py
  | scripts/run_pipeline\.py
  | scripts/robustness_tests\.py
  | tests/conftest\.py
  | tests/e2e/test_training_flow\.py
  | tests/test_env_config\.py
  | scripts/paper_trade\.py
  | tests/test_integration_v9\.py
  | tests/test_shared_memory\.py
  | tests/test_reward_calculator\.py
  | tests/v9_preflight_check\.py
  | tests/verify_days_held\.py
  | trading/broker_factory\.py
  | trading/broker_interface\.py
  | trading/portfolio\.py
  | trading/stop_loss_manager\.py
  | trading/alpaca_client\.py
  | scripts/backtest_ultimate\.py
  | trading/etoro_client\.py
  | training/train\.py
)
'''

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]
