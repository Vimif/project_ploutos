<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ploutos Demo Monitor{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .container { max-width: 1440px; margin: 0 auto; padding: 24px; }
        header {
            background: linear-gradient(135deg, #111827, #1e293b);
            border-bottom: 1px solid #334155;
            margin-bottom: 24px;
        }
        header h1 { color: #f8fafc; font-size: 2rem; margin-bottom: 8px; }
        header p { color: #94a3b8; }
        nav ul { display: flex; gap: 12px; list-style: none; margin-top: 18px; flex-wrap: wrap; }
        nav a {
            display: inline-block;
            padding: 10px 16px;
            border-radius: 999px;
            color: #cbd5e1;
            text-decoration: none;
            background: rgba(51, 65, 85, 0.55);
        }
        nav a.active, nav a:hover { color: #0f172a; background: #7dd3fc; }
        .grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); margin-bottom: 18px; }
        .card {
            background: #111827;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        }
        .card h2 { color: #f8fafc; margin-bottom: 14px; font-size: 1.2rem; }
        .card h3 { color: #cbd5e1; margin-bottom: 8px; font-size: 1rem; }
        .stat-value { font-size: 2rem; font-weight: 700; margin-bottom: 6px; }
        .stat-label { color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.75rem; }
        .positive { color: #34d399; }
        .negative { color: #fb7185; }
        .neutral { color: #f8fafc; }
        .muted { color: #94a3b8; }
        .pill {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            background: #1e293b;
            color: #cbd5e1;
        }
        .pill.warning { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .pill.critical { background: rgba(244, 63, 94, 0.15); color: #fb7185; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #1e293b; }
        th { color: #7dd3fc; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.06em; }
        tr:hover { background: rgba(30, 41, 59, 0.45); }
        .list { display: grid; gap: 12px; }
        .item { background: rgba(30, 41, 59, 0.55); border-radius: 12px; padding: 14px; }
        .loading { text-align: center; color: #94a3b8; padding: 24px; }
        footer { text-align: center; color: #64748b; padding: 24px; }
        canvas { width: 100%; max-height: 320px; }
        @media (max-width: 720px) {
            .container { padding: 16px; }
            .card { padding: 16px; }
            th, td { padding: 8px; font-size: 0.9rem; }
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Ploutos Demo Monitor</h1>
            <p>Read-only cockpit for the eToro demo, live telemetry, and improvement insights.</p>
            <nav aria-label="Main navigation">
                <ul>
                    <li><a href="/" {% if page == "overview" %}class="active" aria-current="page"{% endif %}>Overview</a></li>
                    <li><a href="/demo/session" {% if page == "session" %}class="active" aria-current="page"{% endif %}>Session Analysis</a></li>
                    <li><a href="/demo/insights" {% if page == "insights" %}class="active" aria-current="page"{% endif %}>Improvement Insights</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>Ploutos Demo Monitor - Read-only - {{ now }}</footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        function formatCurrency(value) {
            const safe = Number(value || 0);
            return "$" + safe.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function formatPercent(value) {
            const safe = Number(value || 0) * 100;
            return safe.toFixed(2) + "%";
        }
        function formatDate(value) {
            if (!value) return "-";
            return new Date(value).toLocaleString("fr-FR");
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
